aid: readspeaker
name: ReadSpeaker
description: >-
  ReadSpeaker provides text-to-speech (TTS) cloud and embedded solutions used
  to add voice to websites, mobile apps, e-learning, transportation systems,
  and more. The speechCloud API converts text into high-quality audio in
  multiple languages and voices that can be returned in formats such as MP3
  for use within applications.
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
