specificationVersion: '0.19'
apis:
  - aid: readspeaker:speechcloud-api
    name: ReadSpeaker speechCloud API
    description: >-
      A cloud-based text-to-speech API. When using the API from within your
      software or application, you simply send text to the ReadSpeaker
      speechCloud API servers and receive audio data in the file format you
      specify as a response. The audio file can be stored on your server for
      reuse, further distribution, or other use. Sample code is available in
      multiple languages including PHP, Java, Objective-C, and C++.
    humanURL: https://www.readspeaker.com/solutions/speech-production/readspeaker-speechcloud-api/
    tags:
      - Text-to-Speech
      - Audio
      - Voice
